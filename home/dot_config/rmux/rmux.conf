# rmux configuration — zellij-like keybindings + UI
# Spec: docs/superpowers/specs/2026-06-29-rmux-zellij-keybindings-design.md

# ==============================================================================
# General Options
# ==============================================================================

# Vi mode for copy-mode (required for copy-mode-vi key table)
set -g mode-keys vi

# Clipboard integration (Wayland)
set -g copy-command "wl-copy"

# No delay on escape (avoids lag when exiting copy-mode)
set -g escape-time 0

# Enable 24-bit color
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-ghostty:RGB'

# Start windows and panes at 1 (like zellij)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer scrollback
set -g history-limit 10000

# Rename windows to running command (like zellij)
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}'

# Focus events (for editors)
set -g focus-events on

# Don't exit rmux when closing a session (sesh handles switching)
set -g detach-on-destroy off

# ==============================================================================
# UI Theming — Catppuccin Macchiato (matching zjstatus)
# ==============================================================================
# Palette:
#   base:    #181926    surface0: #363a4f    overlay0: #6e738d
#   text:    #cad3f5    subtext0: #a5adcb    subtext1: #b8c0e0
#   green:   #a6da95    yellow:   #eed49f    blue:     #8aadf4
#   teal:    #8bd5ca    red:      #ed8796    mauve:    #c6a0f6
#   peach:   #f5a97f    overlay1: #494d64

# -- Pane borders --
set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#8aadf4"

# -- Status bar position (top like zellij) --
set -g status-position top
set -g status-style "bg=#181926,fg=#cad3f5"
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 80

# -- Status left: mode indicator + powerline separator --
# Normal mode (green), copy-mode detected via client_prefix or pane_in_mode
set -g status-left "#{?pane_in_mode,#[bg=#8aadf4#,fg=#181926#,bold] SCR  #[bg=#181926#,fg=#8aadf4],#[bg=#a6da95#,fg=#181926#,bold] NOR  #[bg=#181926#,fg=#a6da95]} "

# -- Window (tab) list --
set -g window-status-separator " "
set -g window-status-format "#[fg=#8bd5ca,bg=#181926]#[fg=#181926,bg=#8bd5ca,bold]#I #[fg=#8bd5ca,bg=#363a4f,bold] #W #[fg=#363a4f,bg=#181926]"
set -g window-status-current-format "#[fg=#eed49f,bg=#181926]#[fg=#181926,bg=#eed49f,bold]#I #[fg=#eed49f,bg=#363a4f,bold] #W #[fg=#363a4f,bg=#181926]"

# -- Status right: layout + session --
set -g status-right "#[fg=#494d64,bg=#181926]  #S #[fg=#363a4f]│ #[fg=#494d64]#(echo #{window_layout} | cut -c1-4) "

# -- Message/command styling --
set -g message-style "bg=#eed49f,fg=#181926,bold"
set -g message-command-style "bg=#181926,fg=#eed49f"

# -- Mode (copy-mode highlight) styling --
set -g mode-style "bg=#363a4f,fg=#cad3f5"

# -- Clock --
set -g clock-mode-colour "#8aadf4"

# ==============================================================================
# Root Bindings (no prefix needed — like zellij shared_except "locked")
# ==============================================================================

# -- Pane Navigation --
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# -- Tab (Window) Navigation --
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9
bind -n C-PPage previous-window
bind -n C-NPage next-window

# -- Splits & New Windows --
bind -n M-e split-window -h
bind -n M-d split-window -v
bind -n C-S-t new-window -a

# -- Session (sesh integration) --
bind -n M-w display-popup -E -w 80% -h 70% -b rounded -T ' sesh ' 'sesh-picker'
bind -n M-x detach-client
bind -n M-o run-shell 'sesh last'

# -- Layout Cycling --
bind -n 'M-[' previous-layout
bind -n 'M-]' next-layout

# -- Scroll Mode (enter copy-mode) --
bind -n M-a copy-mode

# ==============================================================================
# Copy-Mode-Vi Overrides (hybrid scroll mode)
# ==============================================================================
# Custom viewport scrolling keys. Cursor/selection keys preserved for text ops.

# -- Viewport Scroll (line) --
bind -T copy-mode-vi i send-keys -X scroll-up
bind -T copy-mode-vi e send-keys -X scroll-up
bind -T copy-mode-vi k send-keys -X scroll-down
bind -T copy-mode-vi d send-keys -X scroll-down

# -- Viewport Scroll (half-page) --
bind -T copy-mode-vi w send-keys -X halfpage-up
bind -T copy-mode-vi s send-keys -X halfpage-down

# -- Viewport Scroll (top/bottom) --
bind -T copy-mode-vi U send-keys -X history-top
bind -T copy-mode-vi O send-keys -X history-bottom
