# Hunk configuration
# https://github.com/modem-dev/hunk

theme = "auto"
mode = "split"
vcs = "git"
watch = false
exclude_untracked = false
line_numbers = false
wrap_lines = false
agent_notes = true
transparent_background = true

# Keybindings
# Overrides REPLACE the default key list for an action (no merge).
# Token syntax: bare chars (q, ?), special (<esc>, <tab>, <space>, <enter>),
# arrows (<up>, <down>, <left>, <right>), modifiers (<c-c>, <s-up>, <a-x>).
# Use "<disabled>" to unbind. Multi-key sequences not supported.

[keybindings.global]
# Navigation (i/k instead of j/k)
"scroll.lineDown" = ["k", "<down>"]      # default: j, <down>
"scroll.lineUp" = ["i", "<up>"]          # default: k, <up>
"scroll.pageDown" = ["<space>", "f", "<pgdown>"]
"scroll.pageUp" = ["b", "<pgup>", "<s-space>"]
"scroll.halfPageDown" = "d"
"scroll.halfPageUp" = "u"
"scroll.toTop" = "<home>"
"scroll.toBottom" = "<end>"
"scroll.codeLeft" = "<left>"
"scroll.codeRight" = "<right>"
"scroll.codeLeftFast" = "<s-left>"
"scroll.codeRightFast" = "<s-right>"
# Hunk navigation
"hunk.prev" = "["
"hunk.next" = "]"
"annotatedHunk.prev" = "{"
"annotatedHunk.next" = "}"
# Layout
"layout.split" = "1"
"layout.stack" = "2"
"layout.auto" = "0"
# Toggles
"sidebar.toggle" = "s"
"theme.cycle" = "t"
"agentNotes.toggle" = "a"
"lineNumbers.toggle" = "l"
"wrap.toggle" = "w"
"hunkHeaders.toggle" = "m"
# General
quit = ["q", "<esc>"]
"help.toggle" = "?"
"filter.focus" = "/"
"focus.toggle" = "<tab>"
reload = "r"
"menu.open" = "<f10>"

[keybindings.pager]
# Navigation (i/k instead of j/k)
quit = ["q", "<esc>"]
"scroll.lineDown" = ["k", "<down>"]      # default: j, <down>
"scroll.lineUp" = ["i", "<up>"]          # default: k, <up>
"scroll.pageDown" = ["<space>", "f", "<pgdown>"]
"scroll.pageUp" = ["b", "<pgup>", "<s-space>"]
"scroll.halfPageDown" = "d"
"scroll.halfPageUp" = "u"
"scroll.toTop" = "<home>"
"scroll.toBottom" = "<end>"
"scroll.codeLeft" = "<left>"
"scroll.codeRight" = "<right>"
"scroll.codeLeftFast" = "<s-left>"
"scroll.codeRightFast" = "<s-right>"
"wrap.toggle" = "w"
"sidebar.toggle" = "s"

[keybindings.menu]
"menu.close" = "<esc>"
"menu.prev" = "<left>"
"menu.next" = ["<right>", "<tab>"]
"menu.itemUp" = "<up>"
"menu.itemDown" = "<down>"
"menu.activate" = ["<enter>", "<return>"]

[keybindings.filter]
"focus.toggle" = "<tab>"
