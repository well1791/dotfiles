# Zellij Plugin Manifest
#
# This file declares zellij plugins to be installed via the install-plugins.sh script.
# Plugins are downloaded from GitHub releases and verified with SHA256 checksums.
#
# To add a new plugin:
#   1. Add a [[plugin]] entry with name, repo, version, and url
#   2. Run: ./scripts/install-plugins.sh
#
# To update plugins:
#   Run: ./scripts/update-plugins.sh
#
# Format:
#   name    - Plugin filename (without .wasm extension)
#   repo    - GitHub repository (owner/repo)
#   version - Git tag/release version
#   url     - Direct download URL for the WASM binary
#   sha256  - SHA256 checksum for integrity verification (optional, leave empty to skip)

[[plugin]]
name = "zellij-vertical-tabs"
repo = "cfal/zellij-vertical-tabs"
version = "v0.1.0"
url = "https://github.com/cfal/zellij-vertical-tabs/releases/download/v0.1.0/zellij-vertical-tabs.wasm"
sha256 = "531091b56ab3bc0008bd14de19f71985e3ab8585110ee021ef8ee413556202a2"

